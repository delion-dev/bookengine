name: Release — Tauri Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "frontend/src-tauri -> target"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install platform-specific native deps
        working-directory: frontend
        run: |
          npm install @tauri-apps/cli-win32-x64-msvc --save-optional || true
          npm install lightningcss-win32-x64-msvc --save-optional || true
          npm install @tailwindcss/oxide-win32-x64-msvc --save-optional || true

      - name: Build Tauri app
        working-directory: frontend
        env:
          BOOKENGINE_LICENSE_SECRET: ${{ secrets.BOOKENGINE_LICENSE_SECRET }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: BookEngine-${{ github.ref_name }}-setup
          path: frontend/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: BookEngine-${{ github.ref_name }}-msi
          path: frontend/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: BookEngine ${{ github.ref_name }}
          draft: true
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: true
          files: |
            frontend/src-tauri/target/release/bundle/nsis/*.exe
            frontend/src-tauri/target/release/bundle/msi/*.msi
          body: |
            ## BookEngine ${{ github.ref_name }}

            ### 다운로드
            | 파일 | 설명 |
            |------|------|
            | `*-setup.exe` | NSIS 설치 마법사 (권장) |
            | `*.msi` | MSI 패키지 |

            ### 설치 요구사항
            - Windows 10 / 11 (64-bit)
            - Google Gemini API 키 또는 OpenAI API 키

            ### 변경 사항
            자동 생성된 릴리즈 노트를 참고하세요.
