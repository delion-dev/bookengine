name: Release — Tauri Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python server dependencies
        run: pip install pyinstaller uvicorn[standard] fastapi pydantic

      - name: Build Python sidecar (PyInstaller)
        run: |
          pyinstaller tools/bookengine_server.spec --distpath frontend/src-tauri/binaries --clean
          # Rename to strip the platform triple if needed (Tauri strips it at runtime)
          ls frontend/src-tauri/binaries/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "frontend/src-tauri -> target"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Windows native bindings
        working-directory: frontend
        run: |
          npm install @tauri-apps/cli-win32-x64-msvc --save-optional || true
          npm install lightningcss-win32-x64-msvc --save-optional || true
          npm install @tailwindcss/oxide-win32-x64-msvc --save-optional || true

      - name: Build Tauri app
        working-directory: frontend
        env:
          BOOKENGINE_LICENSE_SECRET: ${{ secrets.BOOKENGINE_LICENSE_SECRET }}
        run: npm run tauri build -- --bundles nsis,msi

      - name: Upload NSIS installer (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: BookEngine-${{ github.ref_name }}-setup
          path: frontend/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload MSI installer (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: BookEngine-${{ github.ref_name }}-msi
          path: frontend/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: BookEngine ${{ github.ref_name }}
          draft: true
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: true
          files: |
            frontend/src-tauri/target/release/bundle/nsis/*.exe
            frontend/src-tauri/target/release/bundle/msi/*.msi
          body: |
            ## BookEngine ${{ github.ref_name }}

            ### 설치 방법
            1. 아래 `*-setup.exe` 파일 다운로드
            2. 실행 후 설치 진행
            3. 앱 실행 → 라이선스 키 입력 (무료: `BKENG-TRIAL-00000-00000-00000`)
            4. Gemini 또는 OpenAI API 키 입력

            ### 다운로드
            | 파일 | 설명 |
            |------|------|
            | `*-setup.exe` | NSIS 설치 마법사 (권장) |
            | `*.msi` | MSI 패키지 |

            ### 시스템 요구사항
            - Windows 10 / 11 (64-bit)
            - Python 3.11+ (서버 실행용)
            - Google Gemini API 키 또는 OpenAI API 키
